name: Modrinth token check

# Recovery: publishes the not-yet-uploaded jars to Modrinth via the raw API,
# bypassing the publish plugin (which 401s where a raw call succeeds). Delete later.

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/modrinth-token-check.yml

permissions:
  contents: read

jobs:
  publish-remaining:
    name: Publish remaining jars to Modrinth via API
    runs-on: ubuntu-latest
    steps:
      - name: createVersion for the 4 jars not yet on Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          UA="duraping-ci/1.0 (modrinth@mail.redkey.sh)"
          pub() {
            local file="$1" vn="$2" gv="$3" loader="$4"
            gh release download v0.7.0 -R alazso/duraping -p "$file" -D . --clobber
            printf '{"name":"DuraPing %s","version_number":"%s","changelog":"","dependencies":[],"game_versions":[%s],"version_type":"release","loaders":["%s"],"featured":false,"project_id":"JsUDKArh","file_parts":["file"],"primary_file":"file"}' "$vn" "$vn" "$gv" "$loader" > d.json
            code=$(curl -sS -o r.json -w '%{http_code}' -X POST \
              -H "Authorization: $MODRINTH_TOKEN" -H "User-Agent: $UA" \
              -F 'data=<d.json;type=application/json' -F "file=@$file" \
              https://api.modrinth.com/v2/version || echo 000)
            echo "[$vn] HTTP $code  $(jq -rc '{id, error, description}' r.json 2>/dev/null || cat r.json)"
          }
          pub "duraping-fabric-0.7.0+26.1.2.jar"            "0.7.0+fabric-26.1.2"  '"26.1.2"'           "fabric"
          pub "duraping-neoforge-0.7.0+1.21.9-1.21.10.jar"  "0.7.0+1.21.9-1.21.10" '"1.21.9","1.21.10"' "neoforge"
          pub "duraping-neoforge-0.7.0+1.21.11.jar"         "0.7.0+1.21.11"        '"1.21.11"'          "neoforge"
          pub "duraping-neoforge-0.7.0+26.1.2.jar"          "0.7.0+26.1.2"         '"26.1.2"'           "neoforge"
