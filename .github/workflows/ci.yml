name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build & test
        run: ./gradlew build --stacktrace

      - name: Upload jars (snapshot)
        uses: actions/upload-artifact@v7
        with:
          name: duraping-snapshot-${{ github.sha }}
          path: |
            fabric/build/libs/duraping-fabric-*.jar
            neoforge/build/libs/duraping-neoforge-*.jar
            !**/*-sources.jar
            !**/*-javadoc.jar
          if-no-files-found: error

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: "**/build/reports/tests/**"
          if-no-files-found: ignore
